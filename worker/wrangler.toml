name = "vocabapp-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "vocabapp-db"
database_id   = "REPLACE_AFTER_wrangler_d1_create"

[[r2_buckets]]
binding   = "BOOKS"
bucket_name = "vocabapp-books"

# Secrets (set via CLI before deploying):
#   wrangler secret put JWT_SECRET       (random 64-char string, e.g. openssl rand -hex 32)
#   wrangler secret put DEEPSEEK_API_KEY (your DeepSeek API key)
