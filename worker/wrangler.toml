name = "reader-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "reader-db"
database_id   = "efe0a67c-2eea-4d05-a972-1f743310d57e"

[[r2_buckets]]
bucket_name = "reader-books"
binding = "reader_books"

[observability]
enabled = true

[observability.logs]
enabled = true

# Secrets (set via CLI before deploying):
#   wrangler secret put JWT_SECRET       (random 64-char string, e.g. openssl rand -hex 32)
#   wrangler secret put DEEPSEEK_API_KEY (your DeepSeek API key)
